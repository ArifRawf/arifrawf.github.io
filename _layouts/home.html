---
layout: default
---
<!-- Page Header -->
{% if page.background %}
<header class="masthead" style="background-image: url('{{ page.background | prepend: site.baseurl | replace: '//', '/' }}')">
  {% else %}
  <header class="masthead">
    {% endif %}
    <div class="overlay"></div>
    <div class="container">
      <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
          <div class="page-heading">
            <h1>{{ site.title }}</h1>
            {% if site.description %}
            <span class="subheading">{{ site.description }}</span>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </header>
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-10 mx-auto">

        {{ content }}
<div id="posts">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const repoOwner = "ArifRawf";
const repoName = "arifrawf.github.io";

// 🔥 extract thumbnail
function extractImage(md) {
  const match = md.match(/!\[.*?\]\((.*?)\)/);
  return match ? match[1] : "https://via.placeholder.com/800x400";
}

async function loadPosts() {
  const res = await fetch(
    `https://api.github.com/repos/${repoOwner}/${repoName}/issues`
  );
  const issues = await res.json();

  const container = document.getElementById("posts");
  container.innerHTML = "";

  issues.forEach(issue => {
    if (issue.pull_request) return;

    const img = extractImage(issue.body);

    const post = document.createElement("div");
    post.className = "post";

    post.innerHTML = `
    <article class="post-preview">
      <img src="${img}" class="thumb">

      <h2 class="post-title">
        <a href="/post.html?id=${issue.number}">
          ${issue.title}
        </a>
      </h2>

      <h3 class="post-subtitle">${issue.body.substring(0, 120)}...</h3>

      <p class="post-meta">
        ${issue.user.login} • 
        ${new Date(issue.created_at).toDateString()}
      </p>
      </article>
    `;

    container.appendChild(post);
  });
}

loadPosts();
</script>

</div>
    </div>
  </div>
