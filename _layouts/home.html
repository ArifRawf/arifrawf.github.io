---
layout: default
---

<!-- Page Header -->
{% if page.background %}
<header class="masthead" style="background-image: url('{{ page.background | prepend: site.baseurl | replace: '//', '/' }}')">
  {% else %}
  <header class="masthead">
    {% endif %}
    <div class="overlay"></div>
    <div class="container">
      <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
          <div class="page-heading">
            <h1>{{ site.title }}</h1>
            {% if site.description %}
            <span class="subheading">{{ site.description }}</span>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-10 mx-auto">

        {{ content }}

        <!-- Home Post List -->
        <!-- Home Post List (GitHub Issues) -->
<div id="posts"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const repoOwner = "ArifRawf";
const repoName = "ArifRawf.github.io";

async function loadPosts() {
  const res = await fetch(
    `https://api.github.com/repos/${repoOwner}/${repoName}/issues`
  );
  const issues = await res.json();

  const container = document.getElementById("posts");
  container.innerHTML = "";

  issues.slice(0, 5).forEach(issue => {
    if (issue.pull_request) return;

    const article = document.createElement("article");
    article.className = "post-preview";

    article.innerHTML = `
      <a href="/post.html?id=${issue.number}">
        <h2 class="post-title">${issue.title}</h2>
        <h3 class="post-subtitle">
          ${issue.body.substring(0, 120)}...
        </h3>
      </a>
      <p class="post-meta">
        Posted by ${issue.user.login}
        on ${new Date(issue.created_at).toDateString()}
      </p>
    `;

    container.appendChild(article);

    const hr = document.createElement("hr");
    container.appendChild(hr);
  });
}

loadPosts();
</script>
        <!-- Pager -->
        <div class="clearfix">
          <a class="btn btn-primary float-right" href="{{"/posts" | relative_url }}">View All Posts &rarr;</a>
        </div>

      </div>
    </div>
  </div>
